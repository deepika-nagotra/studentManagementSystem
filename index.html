<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System Website</title>
    <link rel="Stylesheet" href="style.css">
</head>
<body>
   
  <div class="sidebar">
        <div class="brand">SMS Portal</div>
        <a href="#" class="active">Dashboard</a>
        <a href="#">Students List</a>
        <a href="#">Attendance</a>
        <a href="#">Settings</a>
    </div>

    <div class="main-content">
        <header>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search student by name...">
            </div>
            <div class="user-profile">Admin Panel 👨‍💼</div>
        </header>

        <div class="container">
            <h2>Student Dashboard</h2>

            <div class="cards-grid">
                <div class="card blue-border">
                    <h3>Total Students</h3>
                    <div class="number" id="total-count">2</div>
                </div>
                <div class="card green-border">
                    <h3>Active Classes</h3>
                    <div class="number">12</div>
                </div>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <h3>Enrolled Students</h3>
                    <button class="btn-add" id="add-student-btn">+ Add Student</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Class</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body">
                         <tr>
                            <td>#101</td>
                            <td>Sujal </td>
                            <td>Class 7</td>
                            <td><button class="btn-delete" onclick="deleteStudent(this)">Delete</button></td>
                         </tr>
                          <tr>
                            <td>#102</td>
                            <td>Raghav </td>
                            <td>Class 5</td>
                            <td><button class="btn-delete" onclick="deleteStudent(this)">Delete</button></td>
                          </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script src="style.js"></script>
</body>
</html>
